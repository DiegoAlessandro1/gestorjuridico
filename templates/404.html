{% extends "base.html" %}

{% block title %}Página Não Encontrada{% endblock %}
{% block page_title %}Erro 404{% endblock %}

{% block content %}
    <div class="row justify-content-center mt-5">
        <div class="col-md-6 text-center">
            <div class="card border-0 shadow-lg">
                <div class="card-body p-5">
                    <i class="bi bi-exclamation-triangle-fill text-warning" style="font-size: 4rem;"></i>
                    <h1 class="mt-4 mb-3">404</h1>
                    <h5 class="text-muted">Página Não Encontrada</h5>
                    <p class="text-muted mt-3">
                        Desculpe, a página que você está procurando não existe ou foi movida.
                    </p>
                    <a href="{{ url_for('main.index') }}" class="btn btn-primary mt-4">
                        <i class="bi bi-house"></i> Voltar ao Dashboard
                    </a>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
