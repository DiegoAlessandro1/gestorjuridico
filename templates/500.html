{% extends "base.html" %}

{% block title %}Erro do Servidor{% endblock %}
{% block page_title %}Erro 500{% endblock %}

{% block content %}
    <div class="row justify-content-center mt-5">
        <div class="col-md-6 text-center">
            <div class="card border-0 shadow-lg">
                <div class="card-body p-5">
                    <i class="bi bi-bug-fill text-danger" style="font-size: 4rem;"></i>
                    <h1 class="mt-4 mb-3">500</h1>
                    <h5 class="text-muted">Erro Interno do Servidor</h5>
                    <p class="text-muted mt-3">
                        Desculpe, ocorreu um erro no servidor. 
                        <br>Por favor, tente novamente mais tarde.
                    </p>
                    <a href="{{ url_for('main.index') }}" class="btn btn-primary mt-4">
                        <i class="bi bi-house"></i> Voltar ao Dashboard
                    </a>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
